name: Build Custom FFmpeg

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            base-devel
            autotools
            git
            nasm
            yasm
            pkgconf
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-x264
            mingw-w64-ucrt-x86_64-x265
            mingw-w64-ucrt-x86_64-svt-av1
            mingw-w64-ucrt-x86_64-dav1d
            mingw-w64-ucrt-x86_64-libvpx
            mingw-w64-ucrt-x86_64-opus
            mingw-w64-ucrt-x86_64-libvorbis
            mingw-w64-ucrt-x86_64-lame
            mingw-w64-ucrt-x86_64-libass
            mingw-w64-ucrt-x86_64-libplacebo
            mingw-w64-ucrt-x86_64-vulkan-headers
            mingw-w64-ucrt-x86_64-vulkan-loader
            mingw-w64-ucrt-x86_64-shaderc
            mingw-w64-ucrt-x86_64-zimg
            mingw-w64-ucrt-x86_64-ffnvcodec-headers
            mingw-w64-ucrt-x86_64-amf-headers
            mingw-w64-ucrt-x86_64-libvpl

      - name: Build libfdk_aac from source
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/mstorsjo/fdk-aac.git
          cd fdk-aac
          autoreconf -fiv
          ./configure --prefix=/ucrt64 --disable-shared --enable-static
          make -j$(nproc)
          make install

      - name: Fetch FFmpeg source
        shell: msys2 {0}
        run: git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git ffmpeg-src

      - name: Configure FFmpeg
        shell: msys2 {0}
        working-directory: ffmpeg-src
        run: |
          export PKG_CONFIG_PATH="/ucrt64/lib/pkgconfig"
          ./configure \
            --prefix=/ucrt64 \
            --pkg-config-flags="--static" \
            --extra-libs="-lpthread" \
            --disable-w32threads \
            --enable-gpl \
            --enable-version3 \
            --enable-nonfree \
            --enable-static \
            --disable-shared \
            --disable-debug \
            --disable-doc \
            --disable-ffplay \
            --enable-ffmpeg \
            --enable-ffprobe \
            --enable-libx264 \
            --enable-libx265 \
            --enable-libsvtav1 \
            --enable-libdav1d \
            --enable-libvpx \
            --enable-libopus \
            --enable-libvorbis \
            --enable-libmp3lame \
            --enable-libfdk-aac \
            --enable-libass \
            --enable-libplacebo \
            --enable-vulkan \
            --enable-libshaderc \
            --enable-libzimg \
            --enable-amf \
            --enable-ffnvcodec \
            --enable-nvenc \
            --enable-nvdec \
            --enable-cuvid \
            --enable-d3d11va \
            --enable-dxva2 \
            --enable-libvpl \
            --enable-zlib \
            --enable-iconv

      - name: Compile
        shell: msys2 {0}
        working-directory: ffmpeg-src
        run: make -j$(nproc)

      - name: Show what got built
        shell: msys2 {0}
        working-directory: ffmpeg-src
        run: |
          ls -lh ffmpeg.exe ffprobe.exe
          ./ffmpeg.exe -version

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-custom-build
          path: |
            ffmpeg-src/ffmpeg.exe
            ffmpeg-src/ffprobe.exe
          retention-days: 7
